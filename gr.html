<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="noindex, nofollow, noarchive" name="robots">
<style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
    }
    .jw-settings-sharing, .jw-icon-pip, .jw-rightclick {
        display: none !important;
    }
    #player {
        width: 100% !important;
        height: 100% !important;
    }
</style>
</head>
<body>

<div id="player"></div>

<script src="//ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
<script type="text/javascript">
    // Configuración de licencia
    jwplayer.key = 'XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo';

    // Función para obtener parámetros de la URL
    function getParameterByName(name) {
        name = name.replace(/[\[]/, "\[").replace(/[\]]/, "\]");
        var regex = new RegExp("[\?&]" + name + "=([^&#]*)"),
        results = regex.exec(location.search);
        return results === null ? "" : decodeURIComponent(results[1].replace(/\+/g, " "));
    }

    var getURL = getParameterByName('get');
    var getIMG = getParameterByName('img');
    var getKEY = getParameterByName('key');
    var getKEY2 = getParameterByName('key2');

    if (getURL === "" || getURL === "#") {
        console.warn('URL no válida');
    }

    // Inicialización del reproductor
    var playerInstance = jwplayer("player").setup({
        playlist: [{
            "image": getIMG,
            "sources": [{
                "file": getURL,
                "type": "dash",
                "drm": {
                    "clearkey": { "keyId": getKEY, "key": getKEY2 }
                }
            }]
        }],
        autostart: true,
        mute: true, // Necesario para autoplay en navegadores modernos
        volume: 100,
        width: "100%",
        height: "100%",
        stretching: "exactfit", // Corrige el tamaño de imagen en 480p
        aspectratio: "16:9",
        cast: {},
        sharing: false,
        liveSyncDuration: 3
    });

    // --- Lógica de Audio y Mejoras ---
    var langIndex = 1; // Índice para español

    playerInstance.on('play', function() {
        try {
            // Intentar forzar el audio en español al iniciar
            playerInstance.setCurrentAudioTrack(langIndex);
        } catch(e) {}
    });

    playerInstance.on("mute", function(e) {
        if (!e.mute) { 
            // 1. Re-confirmar idioma español al quitar el mute
            try {
                playerInstance.setCurrentAudioTrack(langIndex);
            } catch(err) {}

            // 2. Aplicar Audio Boost
            const video = document.querySelector("#player video");
            if (video && !video.audioBoostApplied) {
                aplicarBoost(video);
            }
        }
    });

    function aplicarBoost(video) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const source = audioCtx.createMediaElementSource(video);
            const gain = audioCtx.createGain();
            gain.gain.value = 1.5; 
            source.connect(gain);
            gain.connect(audioCtx.destination);
            video.audioBoostApplied = true;
        } catch(e) { 
            console.warn("Audio boost bloqueado o no compatible"); 
        }
    }

    // Control de rotación en móviles al entrar en pantalla completa
    playerInstance.on("fullscreen", function(e) {
        if (screen.orientation) {
            if (e.fullscreen) { 
                screen.orientation.lock("landscape").catch(function() {}); 
            } else { 
                try { screen.orientation.unlock(); } catch(err) {} 
            }
        }
    });
</script>
</body>
</html>
